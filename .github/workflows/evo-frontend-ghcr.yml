name: Build Frontend to GHCR

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'evo-ai-frontend-community/**'

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/rogermello25/evocrm/evo-frontend-fixed

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./evo-ai-frontend-community
          file: ./evo-ai-frontend-community/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          build-args: |
            VITE_EVOLUTION_API_KEY=${{ secrets.VITE_EVOLUTION_API_KEY }}
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo "Built image digest"
